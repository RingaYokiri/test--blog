---
layout: list_template

title: 館内更新記録

subtitle: Update Log
---

<div class="card">

    <h2>{{ page.title }}</h2>

    <p class="article-subtitle">

        {{ page.subtitle }}

    </p>

    <hr>

    {% for post in site.posts %}

    <p>

        📅 {{ post.date | date: "%Y.%m.%d" }}

    </p>

    <h3>

        <a href="{{ post.url | relative_url }}">

            {{ post.title }}

        </a>

    </h3>

    <p>

        {{ post.subtitle }}

    </p>

    <hr>

    {% endfor %}

</div>
