<!DOCTYPE html>
<html lang="ja">

<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->
<!-- ☆☆☆ head -->
<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->
<head>

    <!-- *.☆.* 文字コード *.☆.* -->
   <meta charset="UTF-8">

    <!-- *.☆.* スマホ対応 *.☆.* -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- *.☆.* ブラウザのタブ名 *.☆.* -->
    <title>記事タイトル | 宵ノ蒐集館</title>

    <!-- *.☆.* CSSサブルーチン呼び出し *.☆.* -->
    <link rel="stylesheet" href="/css/style.css">

</head>

<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->
<!-- ☆☆☆ body -->
<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->
<body>

    <!-- *.☆.* 固定ヘッダー *.☆.* -->
    {% include header.html %}

    <!-- *.☆.* 月の導き *.☆.* -->
    {% include menu.html %}

    <!-- *.☆.* JavaScript *.☆.* -->
    <script src="/js/menu.js"></script>

<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->
<!-- ☆☆☆ main -->
<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->
    <!-- *.☆.* 記事本文 *.☆.* -->
    <main class="article-main">

        <div class="card">

            <!-- *.☆.* 記事タイトル *.☆.* -->
              <!--　例→"対戦よろしくお願いします！" -->
            <h2>
                {{ page.title }}
            </h2>

            <!-- *.☆.* 記事サブタイトル *.☆.* -->
               <!--　例→"─ Rose Garden Record #001 ─" -->
            <p class="article-subtitle">
                {{ page.subtitle }}
            </p>

            <hr>

            <!-- *.☆.* 記録日 *.☆.* -->
               <!--　例→"2026.06.18" -->
            <p>
                📅 記録日：{{ page.date }}
            </p>

            <!-- *.☆.* 記事番号 *.☆.* -->
               <!--　例→"No.0001 / Rose-0001" -->
            <p>
                📖 館内記録：{{ page.museum_number }}
                <br>
                🌹 温室記録：{{ page.room_number }}
            </p>

            <!-- *.☆.* 全てのタグ表示 *.☆.* -->
               <!--　例→" #薔薇 / #蕾 " -->
            <p class="tags">

              {% for tag in page.tags %}

            <span class="tag">
  
              #{{ tag }}

            </span>

              {% endfor %}

            </p>

            <hr>

            <!-- *.☆.* 本文開始 *.☆.* -->
              {{ content }}

            <!-- *.☆.* 本文終了 *.☆.* -->

        </div>


<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->
<!-- ☆☆☆ その他 -->
<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->

        <!-- *.☆.* ページ移動 *.☆.* -->
        <div class="card">

            <h3>館内案内</h3>

            <!-- 前の記事 -->
            <p>
                ◀ 前の記事
            </p>

            <!-- 一覧ページ -->
            <p>
                📖 日誌一覧へ戻る
            </p>

            <!-- 次の記事 -->
            <p>
                次の記事 ▶
            </p>

        </div>

    </main>


<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->
<!-- ☆☆☆ フッター -->
<!-- ｡:*:☆•·················•·················•·················•☆:*｡-->
    <footer>

        宵ノ蒐集館

    </footer>

</body>

</html>
