<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宵霧の部屋</title>

<style>
body {
    background-color: #111;
    color: #e8d8ff;
    font-family: "Yu Gothic", sans-serif;
    margin: 0;
}

header {
    text-align: center;
    padding: 50px 20px;
}

h1 {
    font-size: 3em;
    margin-bottom: 10px;
}

.subtitle {
    color: #b88cff;
}

main {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.card {
    background-color: #1b1b1b;
    border: 1px solid #3a2f4a;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
}

a {
    color: #d8a8ff;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

footer {
    text-align: center;
    padding: 20px;
    color: #777;
}
</style>
</head>

<body>

<header>
    <h1>✦ 宵霧の部屋 ✦</h1>
    <p class="subtitle">
        宝石、旅行、植物、お菓子、好きなものを集めた個人サイト
    </p>
</header>

<main>

    <div class="card">
        <h2>About</h2>
        <p>
            こんにちは。宵霧です。<br>
            趣味や好きなものをゆるく記録しています。
        </p>
    </div>

    <div class="card">
        <h2>Contents</h2>
        <ul>
            <li>🌹 バラの記録</li>
            <li>💎 宝石紹介</li>
            <li>🍰 お菓子レビュー</li>
            <li>✈ 旅行記</li>
            <li>📖 日記</li>
        </ul>
    </div>

    <div class="card">
        <h2>Message</h2>
        <p>
            ゆっくり更新中です。
        </p>
    </div>

</main>

<footer>
    © 2026 宵霧
</footer>

</body>
</html>
